<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bollywood Cinema Pro Max Reveal</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    color:white;
    text-align:center;
    overflow:hidden;

    /* 🎥 Cinematic Background */
    background:
      linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.9)),
      url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1600&q=80");
    background-size:cover;
    background-position:center;
}

/* 🎬 Top marquee lights */
.lights{
    position:absolute;
    top:0;
    width:100%;
    height:10px;
    background: repeating-linear-gradient(
        90deg,
        gold 0px,
        gold 20px,
        black 20px,
        black 40px
    );
    animation: move 2s linear infinite;
}

@keyframes move {
    from {background-position:0;}
    to {background-position:200px;}
}

h1{
    margin-top:120px;
    font-size:40px;
    letter-spacing:2px;
    text-shadow:0 0 20px black;
}

/* 🎬 Button */
.btn{
    padding:15px 30px;
    background:white;
    color:black;
    font-size:20px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    margin-top:30px;
    box-shadow:0 0 25px white;
    font-weight:bold;
}

/* 🎁 Box */
.box{
    width:200px;
    height:200px;
    background: linear-gradient(45deg, #ff0000, #ffcc00);
    margin:50px auto;
    border-radius:20px;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 0 40px gold;
}

/* 🎭 Reveal Screen */
#reveal{
    display:none;
    margin-top:80px;
    animation: pop 1s ease-in-out;
}

@keyframes pop{
    from{transform:scale(0);}
    to{transform:scale(1);}
}

.title{
    font-size:55px;
    color:gold;
    text-shadow:0 0 25px red;
    margin-bottom:20px;
}

/* 📅 Info cards */
.info{
    font-size:22px;
    margin-top:10px;
    color:white;
    background:rgba(0,0,0,0.6);
    display:inline-block;
    padding:10px 25px;
    border-radius:15px;
    box-shadow:0 0 20px gold;
}

/* 🎈 Balloons */
.balloon{
    position:absolute;
    width:30px;
    height:40px;
    border-radius:50%;
    animation: float 6s linear infinite;
}

@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-200px);}
}

/* 🎊 Confetti */
.confetti{
    position:absolute;
    width:8px;
    height:8px;
    background:red;
    animation: fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(720deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="lights"></div>

<h1>🎬 Annual Event Trailer Loading...</h1>

<button class="btn" onclick="start()">START TRAILER</button>

<div class="box" id="box" onclick="reveal()">🎁 OPEN BOX</div>

<!-- 🎭 REVEAL -->
<div id="reveal">
    <div class="title">🎭 BOLLYWOOD THEME REVEALED 🎭</div>

    <div class="info">📅 Date: 7th August</div><br>
    <div class="info">📍 Venue: Nashik</div>
</div>

<script>

function start(){
    document.querySelector(".btn").style.display="none";
    document.getElementById("box").style.display="flex";
    createBalloons();
}

/* 🎁 Reveal */
function reveal(){
    document.getElementById("box").style.display="none";
    document.getElementById("reveal").style.display="block";
    burstConfetti();
}

/* 🎈 Balloons */
function createBalloons(){
    for(let i=0;i<14;i++){
        let b=document.createElement("div");
        b.className="balloon";
        b.style.left=Math.random()*100+"vw";
        b.style.background=["red","gold","pink","orange","white","purple"][Math.floor(Math.random()*6)];
        b.style.animationDuration=(3+Math.random()*5)+"s";
        document.body.appendChild(b);
    }
}

/* 🎊 Confetti Burst */
function burstConfetti(){
    for(let i=0;i<150;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.top=Math.random()*10+"vh";
        c.style.background=["red","gold","white","orange","pink"][Math.floor(Math.random()*5)];
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }
}

</script>

</body>
</html>
